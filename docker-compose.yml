services:
  # ==========================================
  # 1. DATABASE SERVICE (PostgreSQL)
  # ==========================================
  postgres:
    container_name: admin_orderlist-postgres
    build:
      context: ./database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-mydtbmav}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mydtbmav}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ==========================================
  # 2. REDIS SERVICE (Session + Queue)
  # ==========================================
  redis:
    container_name: admin_orderlist-redis
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # ==========================================
  # 3. BACKEND SERVICE (Node.js)
  # ==========================================
  backend:
    container_name: admin_orderlist-backend
    build:
      context: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"   # Main API
    volumes:
      # Upload ảnh gói (/image_product), ảnh biến thể (/image_variant), ảnh bài viết (/image)
      - backend_product_images:/app/image_product
      - backend_variant_images:/app/image_variant
      - backend_article_images:/app/image
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ==========================================
  # 4. WEBHOOK SERVICE (Sepay — tách riêng khỏi API)
  # ==========================================
  webhook:
    container_name: admin_orderlist-webhook
    build:
      context: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    command: ["node", "webhook-server.js"]
    ports:
      - "5000:5000"   # Sepay webhook (Host Nginx proxy /webhook, /bot/payment_sepay/)
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ==========================================
  # 5. SCHEDULER SERVICE (Cron jobs — tách riêng khỏi API)
  # ==========================================
  scheduler:
    container_name: admin_orderlist-scheduler
    build:
      context: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    command: ["node", "scheduler.js"]
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ==========================================
  # 6. FRONTEND SERVICE (React + Vite)
  # ==========================================
  frontend:
    container_name: admin_orderlist-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://admin.mavrykpremium.store}
    restart: always
    ports:
      - "8081:80"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

# ==========================================
# NGINX: Chạy qua Host Nginx (Unified). Xem Website/nginx-server.conf.
# Admin: admin.mavrykpremium.store -> 8081 (frontend), 3001 (api), 5000 (webhook).
# ==========================================

# ==========================================
# NETWORKS & VOLUMES
# ==========================================
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_product_images:
  backend_variant_images:
  backend_article_images:
