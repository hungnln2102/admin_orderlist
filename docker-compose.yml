version: '3.8'

services:
  # ==========================================
  # 1. DATABASE SERVICE (PostgreSQL)
  # ==========================================
  postgres:
    container_name: admin_orderlist-postgres
    build:
      context: ./database
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-mydtbmav}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mydtbmav}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # 2. BACKEND SERVICE (Node.js)
  # ==========================================
  backend:
    container_name: admin_orderlist-backend
    build:
      context: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"   # Main API
      - "5000:5000"   # Sepay webhook (Host Nginx proxy /webhook, /bot/payment_sepay/)
    volumes:
      # Upload ảnh gói (/image_product), ảnh biến thể (/image_variant), ảnh bài viết (/image)
      - backend_product_images:/app/image_product
      - backend_variant_images:/app/image_variant
      - backend_article_images:/app/image
    networks:
      - app-network

  # ==========================================
  # 3. FRONTEND SERVICE (React + Vite)
  # ==========================================
  frontend:
    container_name: admin_orderlist-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: https://admin.mavrykpremium.store
    restart: always
    ports:
      - "8081:80"
    networks:
      - app-network

# ==========================================
# NGINX: Chạy qua Host Nginx (Unified). Xem Website/nginx-server.conf.
# Admin: admin.mavrykpremium.store -> 8081 (frontend), 3001 (api), 5000 (webhook).
# ==========================================

# ==========================================
# NETWORKS & VOLUMES
# ==========================================
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_product_images:
  backend_variant_images:
  backend_article_images:
