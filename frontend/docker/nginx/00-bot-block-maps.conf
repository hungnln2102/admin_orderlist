# Rate limit + maps for vulnerability scanners (http context — loaded before default server)

limit_req_zone $binary_remote_addr zone=frontend_general:10m rate=25r/s;
limit_req_status 429;

map $http_user_agent $bad_scanner_ua {
    default 0;
    ~*(nikto|sqlmap|masscan|zgrab|acunetix|nessus|openvas|wpscan|dirbuster|gobuster|havij) 1;
}
