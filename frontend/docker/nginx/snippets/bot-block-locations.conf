# Block known vulnerability scanners before SPA fallback serves index.html with 200

if ($bad_scanner_ua) {
    return 444;
}

# PHP / WordPress probes (no PHP on this stack)
location ~* \.php$ {
    access_log off;
    return 444;
}

location ~* ^/(wp-admin|wp-content|wp-includes|wp-login\.php|wordpress) {
    access_log off;
    return 444;
}

location ~* ^/(xmlrpc\.php|phpmyadmin|pma) {
    access_log off;
    return 444;
}

location ~* ^/(\.env|\.git|\.svn|\.htaccess|\.htpasswd) {
    access_log off;
    return 444;
}

# Hikvision / IoT exploit probes
location ~* ^/SDK/ {
    access_log off;
    return 444;
}

# Path traversal (e.g. /./index-*.js)
location ~ /\. {
    access_log off;
    return 444;
}

# Common webshell / backdoor filenames seen in scan logs
location ~* ^/(inputs|baxa1|aa|wikindex|doc|xleetshell|makeasmtp|worksec|wp-commentin|wp-cron|wp-trackback|wp-2019|comfunctions|custom-plugin|login|mini|shell|c99|r57|wso|1)\.php$ {
    access_log off;
    return 444;
}
