map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_accept $homepage_variant {
    default            /index.html;
    "~*text/markdown" /index.md;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_api_upstream backend:3001;
    set $backend_webhook_upstream backend:5000;
    set $agent_links '</.well-known/api-catalog>; rel="api-catalog", </docs/api>; rel="service-doc", </docs/api/openapi.json>; rel="service-desc", </.well-known/mcp/server-card.json>; rel="mcp-server"';

    include /etc/nginx/snippets/deny-ips.conf;
    include /etc/nginx/snippets/bot-block-locations.conf;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Link $agent_links always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /index.md {
        default_type text/markdown;
        expires -1;
        add_header Link $agent_links always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = / {
        expires -1;
        add_header Link $agent_links always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $homepage_variant =404;
    }

    location = /auth.md {
        default_type text/markdown;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /.well-known/oauth-protected-resource {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /.well-known/agent-skills/index.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /.well-known/mcp/server-card.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /docs/api {
        default_type text/markdown;
        add_header Cache-Control "no-store" always;
        try_files /docs/api/index.md =404;
    }

    location = /docs/api/openapi.json {
        default_type application/openapi+json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /webhook {
        proxy_pass http://$backend_webhook_upstream/api/payment/notify;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ^~ /bot/payment_sepay/ {
        rewrite ^/bot/payment_sepay/.*$ /api/payment/notify break;
        proxy_pass http://$backend_webhook_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://$backend_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /image/ {
        proxy_pass http://$backend_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        limit_req zone=frontend_general burst=80 nodelay;
        expires -1;
        add_header Link $agent_links always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri /index.html;
    }
}
